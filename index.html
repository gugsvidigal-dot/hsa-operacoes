<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a6b3a">
<title>HSA · Operações</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F1117;--surf:#1a1d27;--surf2:#22263a;--border:#2d3250;
  --text:#e8eaf0;--muted:#6b7280;--accent:#1a6b3a;--accent2:#2a9d5c;
  --green:#34C77B;--red:#F05252;--yellow:#F0B429;--blue:#5B8DEF;
  --in:#1a3a6b;--out:#6b1a1a;--cafe:#1a4a2a;--cafeout:#4a2a6b;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;font-size:13px;min-height:100vh}

/* Senha */
#senha-overlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}
.senha-box{background:var(--surf);border:1px solid var(--border);border-radius:20px;padding:40px;width:320px;text-align:center}
.senha-box h1{font-size:28px;color:var(--accent2);margin-bottom:8px}
.senha-box p{color:var(--muted);font-size:13px;margin-bottom:24px}
.senha-box input{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--surf2);color:var(--text);font-size:14px;outline:none;margin-bottom:12px;text-align:center;letter-spacing:2px}
.senha-box button{width:100%;padding:13px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.senha-box .erro{color:var(--red);font-size:12px;margin-top:8px}

/* Loading */
#loading-overlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:9990;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-msg{color:var(--muted);font-size:14px}

/* Header */
header{background:var(--surf);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.logo{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.header-title{font-size:18px;font-weight:700;color:var(--text)}
.header-sub{font-size:11px;color:var(--muted)}
.header-status{margin-left:auto;font-size:11px;color:var(--muted);background:var(--surf2);padding:4px 10px;border-radius:8px}

/* Nav meses */
.mes-nav{background:var(--surf);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:8px;overflow-x:auto}
.mes-nav button{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;white-space:nowrap;transition:all .2s}
.mes-nav button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.mes-nav .nav-arrow{padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:14px}

/* Legenda */
.legenda{padding:10px 20px;display:flex;flex-wrap:wrap;gap:8px;border-bottom:1px solid var(--border)}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.leg-dot{width:12px;height:12px;border-radius:3px}

/* Grade */
.grade-wrap{overflow-x:auto;padding:16px 20px}
table.grade{border-collapse:collapse;min-width:100%}
table.grade th{background:var(--surf);border:1px solid var(--border);padding:6px 8px;font-size:11px;font-weight:600;color:var(--muted);white-space:nowrap;position:sticky;top:0}
table.grade th.dia-hoje{background:rgba(52,199,123,.15);color:var(--green)}
table.grade th.dia-col{min-width:130px;text-align:center}
table.grade th.chale-col{min-width:100px;text-align:left;position:sticky;left:0;background:var(--surf);z-index:10}
table.grade td{border:1px solid var(--border);vertical-align:top;padding:0}
table.grade td.chale-name{padding:8px 10px;font-weight:700;font-size:12px;background:var(--surf2);position:sticky;left:0;z-index:5;white-space:nowrap}
table.grade td.dia-cell{padding:0;min-width:130px;vertical-align:top}
table.grade td.dia-cell.vazio{background:var(--bg)}
table.grade td.dia-cell.hoje{background:rgba(52,199,123,.04)}

/* Células de reserva */
.res-cell{padding:5px 7px;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .15s}
.res-cell:last-child{border-bottom:none}
.res-cell:hover{opacity:.85}
.res-cell.tipo-in{background:rgba(26,58,107,.6);border-left:3px solid #5B8DEF}
.res-cell.tipo-out{background:rgba(107,26,26,.5);border-left:3px solid var(--red)}
.res-cell.tipo-cafe{background:rgba(26,74,42,.5);border-left:3px solid var(--green)}
.res-cell.tipo-cafeout{background:rgba(74,42,107,.5);border-left:3px solid #a78bfa}
.res-cell .rc-tipo{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.res-cell .rc-nome{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.res-cell .rc-info{font-size:10px;color:var(--muted);display:flex;flex-wrap:wrap;gap:3px;margin-top:2px}
.res-cell .rc-badge{background:var(--surf2);padding:1px 5px;border-radius:4px;font-size:9px}
.res-cell .rc-apagar{font-size:10px;color:var(--yellow);margin-top:3px;cursor:pointer}
.res-cell .rc-apagar:hover{color:#fff}

/* Modal A pagar */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:var(--surf);border:1px solid var(--border);border-radius:16px;padding:24px;width:340px;max-width:90vw}
.modal-box h3{margin-bottom:16px;font-size:16px}
.modal-box input,.modal-box textarea{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surf2);color:var(--text);font-size:13px;outline:none;margin-bottom:10px}
.modal-box textarea{resize:vertical;min-height:80px}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;padding:10px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600}
.btn-save{background:var(--accent2);color:#fff}
.btn-cancel{background:var(--surf2);color:var(--text)}

/* Sem reservas */
.sem-res{text-align:center;padding:60px 20px;color:var(--muted)}
</style>
</head>
<body>

<!-- Senha -->
<div id="senha-overlay">
  <div class="senha-box">
    <div style="font-size:48px;margin-bottom:12px">🏡</div>
    <h1>HSA Operações</h1>
    <p>Painel de Operações · Reservas</p>
    <input type="password" id="senha-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')verificarSenha()">
    <button onclick="verificarSenha()">Entrar →</button>
    <div class="erro" id="senha-erro"></div>
  </div>
</div>

<!-- Loading -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div id="loading-msg">Carregando reservas...</div>
</div>

<!-- Header -->
<header>
  <div class="logo">🏡</div>
  <div>
    <div class="header-title">HSA · Operações</div>
    <div class="header-sub">Painel de Operações · Reservas</div>
  </div>
  <div class="header-status" id="status-bar">Aguardando...</div>
</header>

<!-- Nav meses -->
<div class="mes-nav" id="mes-nav">
  <button class="nav-arrow" onclick="navMes(-1)">‹</button>
  <button class="nav-arrow" onclick="navMes(1)">›</button>
</div>

<!-- Legenda -->
<div class="legenda">
  <div class="leg-item"><div class="leg-dot" style="background:rgba(26,58,107,.8);border-left:3px solid #5B8DEF"></div> Check-in</div>
  <div class="leg-item"><div class="leg-dot" style="background:rgba(107,26,26,.7);border-left:3px solid var(--red)"></div> Check-out</div>
  <div class="leg-item"><div class="leg-dot" style="background:rgba(26,74,42,.7);border-left:3px solid var(--green)"></div> Café</div>
  <div class="leg-item"><div class="leg-dot" style="background:rgba(74,42,107,.7);border-left:3px solid #a78bfa"></div> Café + Out</div>
</div>

<!-- Grade -->
<div class="grade-wrap" id="grade-wrap">
  <div class="sem-res">Carregando dados...</div>
</div>

<!-- Modal A pagar -->
<div class="modal-overlay" id="modal-apagar">
  <div class="modal-box">
    <h3 id="modal-titulo">A pagar</h3>
    <div id="modal-info" style="font-size:12px;color:var(--muted);margin-bottom:12px"></div>
    <input type="text" id="modal-valor" placeholder="Ex: R$ 1.260 (CC 4x) ou R$ 1.222 (PIX)">
    <textarea id="modal-obs" placeholder="Observações adicionais..."></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="btn-save" onclick="salvarApagar()">💾 Salvar</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const SENHA_HASH = btoa('Clag#2026');
const DBX_APP_KEY    = 't9mc3s9ugrc93m0';
const DBX_APP_SECRET = 'tzoxlevzfu4o9x7';
const DBX_REFRESH    = 'YyymmuyHYqwAAAAAAAAAAUfgijZMK3bc4OIseueVt7JpZQjjfIh398AB9tq6FE2F';
const DBX_EXCEL_PATH = '/Monte Verde + TV/Gerencial/Gerencial HSA_2026_v1 (Oficial).xlsx';
const DBX_APAGAR_PATH = '/Monte Verde + TV/Gerencial/hsa_operacoes_apagar.json';

const CHALES = ['Everest','Monviso','Martigny','Charmey','Cheverny','Monblanc'];
const MESES_LABELS = ['Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MESES_IDX = [3,4,5,6,7,8,9,10,11]; // índices 0-based
const STATUS_OK = ['Concluída','Confirmada e Paga Parcial','Concluída - ag. Pgto agência',
  'Confirmada e Paga 100%','Confirmada e Não Paga','Confirmada e CC Inválido',
  'Concluída - No Show','Em cotação'];

let dbxToken = '';
let reservas = []; // lista processada
let apagar = {}; // { "chale|resNum|data": { valor, obs } }
let mesSel = 3; // abril = índice 3
let modalKey = '';

// ═══════════════════════════════════════════════════════
// SENHA
// ═══════════════════════════════════════════════════════
function verificarSenha() {
  const v = document.getElementById('senha-input').value;
  if (btoa(v) === SENHA_HASH) {
    localStorage.setItem('hsa_ops_auth','1');
    document.getElementById('senha-overlay').style.display = 'none';
    document.getElementById('loading-overlay').style.display = 'flex';
    iniciar();
  } else {
    document.getElementById('senha-erro').textContent = 'Senha incorreta';
  }
}

// ═══════════════════════════════════════════════════════
// DROPBOX
// ═══════════════════════════════════════════════════════
async function dbxToken_() {
  const r = await fetch('https://api.dropboxapi.com/oauth2/token', {
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:`grant_type=refresh_token&refresh_token=${DBX_REFRESH}&client_id=${DBX_APP_KEY}&client_secret=${DBX_APP_SECRET}`
  });
  const d = await r.json();
  dbxToken = d.access_token;
}

async function dbxBaixarExcel() {
  setMsg('Baixando planilha...');
  const r = await fetch('https://content.dropboxapi.com/2/files/download', {
    method:'POST',
    headers:{'Authorization':'Bearer '+dbxToken,'Dropbox-API-Arg':JSON.stringify({path:DBX_EXCEL_PATH})}
  });
  if (!r.ok) throw new Error('Erro ao baixar Excel: '+r.status);
  return await r.arrayBuffer();
}

async function dbxBaixarApagar() {
  try {
    const r = await fetch('https://content.dropboxapi.com/2/files/download', {
      method:'POST',
      headers:{'Authorization':'Bearer '+dbxToken,'Dropbox-API-Arg':JSON.stringify({path:DBX_APAGAR_PATH})}
    });
    if (!r.ok) return {};
    const txt = await r.text();
    return JSON.parse(txt);
  } catch(e) { return {}; }
}

async function dbxSalvarApagar() {
  const json = JSON.stringify(apagar, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  await fetch('https://content.dropboxapi.com/2/files/upload', {
    method:'POST',
    headers:{
      'Authorization':'Bearer '+dbxToken,
      'Content-Type':'application/octet-stream',
      'Dropbox-API-Arg':JSON.stringify({path:DBX_APAGAR_PATH,mode:'overwrite',mute:true})
    },
    body: blob
  });
}

// ═══════════════════════════════════════════════════════
// PARSERS
// ═══════════════════════════════════════════════════════
function parseMoeda(v) {
  if (!v) return 0;
  if (typeof v === 'number') return v;
  let s = String(v).replace(/R\$\s*/g,'').trim();
  if (s.includes(',')&&s.includes('.')) {
    s = s.lastIndexOf('.')>s.lastIndexOf(',')?s.replace(/,/g,''):s.replace(/\./g,'').replace(',','.');
  } else if (s.includes(',')) {
    s = s.split(',')[1]?.length===3?s.replace(',',''):s.replace(',','.');
  }
  return parseFloat(s)||0;
}

function excelDateToJS(v) {
  if (!v) return null;
  if (typeof v === 'number') {
    const d = new Date(Math.round((v-25569)*86400*1000));
    d.setMinutes(d.getMinutes()+d.getTimezoneOffset());
    return d;
  }
  if (typeof v === 'string') {
    // MM/DD/YY ou DD/MM/YYYY
    const m1 = v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
    if (m1) {
      const y = m1[3].length===2?2000+parseInt(m1[3]):parseInt(m1[3]);
      // Formato M/D/YY do Dropbox
      return new Date(y, parseInt(m1[1])-1, parseInt(m1[2]));
    }
  }
  const d = new Date(v);
  return isNaN(d)?null:d;
}

function toDateKey(d) {
  if (!d) return '';
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function getChale(raw) {
  if (!raw) return '';
  const m = String(raw).match(/\]\s*(.+)/);
  return m ? m[1].trim() : String(raw).trim();
}

// ═══════════════════════════════════════════════════════
// PROCESSAR RESERVAS
// ═══════════════════════════════════════════════════════
function processarVendas(wb) {
  setMsg('Processando reservas...');
  const ws = wb.Sheets['Vendas_BD'];
  if (!ws) throw new Error('Aba Vendas_BD não encontrada');
  const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
  if (!rows.length) return;

  const keys = Object.keys(rows[0]);
  const kEntrada  = keys.find(k=>k.includes('Entrada'))||'Entrada';
  const kSaida    = keys.find(k=>k.includes('Saída')||k.includes('Saida'))||'Saída';
  const kStatus   = keys.find(k=>k.includes('Status'))||'Status';
  const kChale    = keys.find(k=>k.includes('Chalé')||k.includes('Chale'))||'Chalé';
  const kPax      = keys.find(k=>k.includes('PAX')||k.includes('Hóspedes'))||'# PAX';
  const kNome     = keys.find(k=>k.trim()==='Hóspede'||k.trim()==='Hospede')||'Hóspede';
  const kTel      = keys.find(k=>k.includes('Telefone'))||'Telefone';
  const kPets     = keys.find(k=>k.trim()==='Pets')||'Pets';
  const kExtra1   = keys.find(k=>k.includes('Extra 1'))||'Extra 1';
  const kExtra2   = keys.find(k=>k.includes('Extra 2'))||'Extra 2';
  const kExtra3   = keys.find(k=>k.includes('Extra 3'))||'Extra 3';
  const kObs      = keys.find(k=>k.includes('Observa'))||'Observações';
  const kRes      = keys.find(k=>k.includes('Reserva')||k.includes('#'))||'# Reserva';

  reservas = [];
  rows.forEach(r => {
    const status = String(r[kStatus]||'');
    if (!STATUS_OK.includes(status)) return;

    const dtE = excelDateToJS(r[kEntrada]);
    const dtS = excelDateToJS(r[kSaida]);
    if (!dtE || !dtS) return;

    // Filtrar apenas abr-dez 2026
    const ano = dtE.getFullYear();
    if (ano !== 2026) return;
    const mesE = dtE.getMonth();
    if (mesE < 3) return; // antes de abril

    const chale = getChale(r[kChale]);
    if (!CHALES.includes(chale)) return;

    const pax   = parseInt(r[kPax])||0;
    const nome  = String(r[kNome]||'').trim();
    const tel   = String(r[kTel]||'').trim();
    const pets  = parseInt(r[kPets])||0;
    const extra1= String(r[kExtra1]||'').trim();
    const extra2= String(r[kExtra2]||'').trim();
    const extra3= String(r[kExtra3]||'').trim();
    const obs   = String(r[kObs]||'').trim();
    const resNum= String(r[kRes]||'').trim();

    const extras = [extra1,extra2,extra3].filter(e=>e&&e!=='-'&&e!=='0');

    // Gerar entradas para cada dia da reserva
    const cur = new Date(dtE);
    while (cur <= dtS) {
      const dateKey = toDateKey(cur);
      const mesAtual = cur.getMonth();
      const diaE = cur.getTime()===dtE.getTime();
      const diaS = cur.getTime()===dtS.getTime();

      let tipo, horario, qtdCafe;
      if (diaE && diaS) {
        // Entrada e saída no mesmo dia: mostrar IN
        tipo = 'IN'; horario = '15h'; qtdCafe = 0;
      } else if (diaE) {
        tipo = 'IN'; horario = '15h'; qtdCafe = 0;
      } else if (diaS) {
        tipo = 'CAFÉ + OUT'; horario = '12h'; qtdCafe = pax;
      } else {
        tipo = 'CAFÉ'; horario = 'Confirmar'; qtdCafe = pax;
      }

      // Apenas abr-dez 2026
      if (cur.getFullYear()===2026 && mesAtual>=3) {
        reservas.push({
          dateKey, chale, tipo, horario, pax, qtdCafe,
          nome, tel, pets, extras, obs, resNum,
          dtEntrada: toDateKey(dtE), dtSaida: toDateKey(dtS)
        });
      }

      cur.setDate(cur.getDate()+1);
    }
  });
}

// ═══════════════════════════════════════════════════════
// RENDERIZAR GRADE
// ═══════════════════════════════════════════════════════
function getDiasDoMes(mes, ano) {
  return new Date(ano, mes+1, 0).getDate();
}

function renderGrade() {
  const wrap = document.getElementById('grade-wrap');
  const hoje = new Date();
  const ano = 2026;
  const nDias = getDiasDoMes(mesSel, ano);
  const dias = Array.from({length:nDias},(_,i)=>i+1);

  // Filtrar reservas do mês
  const prefix = `${ano}-${String(mesSel+1).padStart(2,'0')}-`;
  const resMes = reservas.filter(r=>r.dateKey.startsWith(prefix));

  // Dias da semana
  const diasSemana = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

  let html = `<table class="grade">
  <thead><tr>
    <th class="chale-col">Chalé</th>`;

  dias.forEach(d => {
    const dt = new Date(ano, mesSel, d);
    const isHoje = dt.toDateString()===hoje.toDateString();
    const ds = diasSemana[dt.getDay()];
    const isWeekend = dt.getDay()===0||dt.getDay()===6;
    html += `<th class="dia-col${isHoje?' dia-hoje':''}" style="${isWeekend?'background:rgba(255,255,255,.03)':''}">
      <div>${d}</div><div style="font-size:9px;font-weight:normal;color:${isHoje?'var(--green)':'var(--muted)'}">${ds}</div>
    </th>`;
  });
  html += `</tr></thead><tbody>`;

  CHALES.forEach(chale => {
    html += `<tr><td class="chale-name">${chale}</td>`;
    dias.forEach(d => {
      const dateKey = `${ano}-${String(mesSel+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dt = new Date(ano, mesSel, d);
      const isHoje = dt.toDateString()===hoje.toDateString();
      const isWeekend = dt.getDay()===0||dt.getDay()===6;
      const celRes = resMes.filter(r=>r.dateKey===dateKey&&r.chale===chale);

      if (celRes.length===0) {
        html += `<td class="dia-cell vazio${isHoje?' hoje':''}" style="${isWeekend?'background:rgba(255,255,255,.01)':''}"></td>`;
      } else {
        html += `<td class="dia-cell${isHoje?' hoje':''}" style="${isWeekend?'background:rgba(255,255,255,.02)':''}">`;
        celRes.forEach(res => {
          const aKey = `${chale}|${res.resNum}|${res.dtEntrada}`;
          const ap = apagar[aKey]||{valor:'',obs:''};
          const tipoClass = res.tipo==='IN'?'tipo-in':res.tipo==='CAFÉ + OUT'?'tipo-cafeout':res.tipo==='CAFÉ'?'tipo-cafe':'tipo-out';
          const tipoLabel = res.tipo==='CAFÉ + OUT'?'☕ OUT':res.tipo==='CAFÉ'?'☕':res.tipo==='IN'?'▶ IN':'◀ OUT';
          const extraStr = res.extras.join(', ');
          html += `<div class="res-cell ${tipoClass}" onclick="abrirModal('${aKey}','${res.nome}','${chale}','${dateKey}')">
            <div class="rc-tipo">${tipoLabel} · ${res.horario}</div>
            <div class="rc-nome">${res.nome||'—'}</div>
            <div class="rc-info">`;
          if (res.pax)    html += `<span class="rc-badge">👥${res.pax}</span>`;
          if (res.qtdCafe)html += `<span class="rc-badge">☕${res.qtdCafe}</span>`;
          if (res.pets)   html += `<span class="rc-badge">🐾${res.pets}</span>`;
          if (extraStr)   html += `<span class="rc-badge" title="${extraStr}">+extras</span>`;
          html += `</div>`;
          if (res.tel)    html += `<div style="font-size:9px;color:var(--muted);margin-top:2px">📞 ${res.tel}</div>`;
          if (extraStr)   html += `<div style="font-size:9px;color:var(--muted);margin-top:1px">🎁 ${extraStr}</div>`;
          if (res.obs)    html += `<div style="font-size:9px;color:var(--muted);margin-top:1px">📝 ${res.obs.slice(0,40)}</div>`;
          html += `<div class="rc-apagar" onclick="event.stopPropagation();abrirModal('${aKey}','${res.nome}','${chale}','${dateKey}')">
            💰 ${ap.valor?ap.valor:'A pagar: —'}</div>
          </div>`;
        });
        html += `</td>`;
      }
    });
    html += `</tr>`;
  });

  html += `</tbody></table>`;
  wrap.innerHTML = html;
}

// ═══════════════════════════════════════════════════════
// NAV MESES
// ═══════════════════════════════════════════════════════
function renderNavMeses() {
  const nav = document.getElementById('mes-nav');
  const btns = MESES_LABELS.map((m,i)=>
    `<button onclick="setMes(${MESES_IDX[i]},this)" class="${MESES_IDX[i]===mesSel?'on':''}">${m}</button>`
  ).join('');
  nav.innerHTML = `<button class="nav-arrow" onclick="navMes(-1)">‹</button>${btns}<button class="nav-arrow" onclick="navMes(1)">›</button>`;
}

function setMes(mes, btn) {
  mesSel = mes;
  document.querySelectorAll('.mes-nav button:not(.nav-arrow)').forEach(b=>b.classList.remove('on'));
  if(btn) btn.classList.add('on');
  renderGrade();
}

function navMes(delta) {
  const idx = MESES_IDX.indexOf(mesSel);
  const newIdx = Math.max(0, Math.min(MESES_IDX.length-1, idx+delta));
  mesSel = MESES_IDX[newIdx];
  renderNavMeses();
  renderGrade();
}

// ═══════════════════════════════════════════════════════
// MODAL A PAGAR
// ═══════════════════════════════════════════════════════
function abrirModal(key, nome, chale, data) {
  modalKey = key;
  const ap = apagar[key]||{valor:'',obs:''};
  document.getElementById('modal-titulo').textContent = `A pagar · ${chale}`;
  document.getElementById('modal-info').textContent = `${nome} · ${data}`;
  document.getElementById('modal-valor').value = ap.valor||'';
  document.getElementById('modal-obs').value = ap.obs||'';
  document.getElementById('modal-apagar').classList.add('show');
}

function fecharModal() {
  document.getElementById('modal-apagar').classList.remove('show');
  modalKey = '';
}

async function salvarApagar() {
  const valor = document.getElementById('modal-valor').value.trim();
  const obs   = document.getElementById('modal-obs').value.trim();
  apagar[modalKey] = {valor, obs};
  fecharModal();
  renderGrade();
  setStatus('💾 Salvando...');
  try {
    await dbxSalvarApagar();
    setStatus('✅ Salvo!');
  } catch(e) {
    setStatus('❌ Erro ao salvar');
  }
}

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
function setMsg(m) { document.getElementById('loading-msg').textContent = m; }
function setStatus(m) { document.getElementById('status-bar').textContent = m; }
function esconderLoading() {
  document.getElementById('loading-overlay').style.display = 'none';
}

// ═══════════════════════════════════════════════════════
// INICIAR
// ═══════════════════════════════════════════════════════
async function iniciar() {
  try {
    setMsg('Conectando ao Dropbox...');
    await dbxToken_();
    setMsg('Baixando planilha...');
    const buf = await dbxBaixarExcel();
    const wb = XLSX.read(buf, {type:'array', cellDates:false});
    processarVendas(wb);
    setMsg('Carregando "A pagar"...');
    apagar = await dbxBaixarApagar();
    // Definir mês atual (se estiver em abr-dez 2026)
    const hoje = new Date();
    if (hoje.getFullYear()===2026 && hoje.getMonth()>=3) {
      mesSel = hoje.getMonth();
    }
    renderNavMeses();
    renderGrade();
    esconderLoading();
    setStatus('✅ ' + reservas.length + ' dias carregados · ' + new Date().toLocaleTimeString('pt-BR'));
  } catch(e) {
    esconderLoading();
    setStatus('❌ ' + e.message);
    document.getElementById('grade-wrap').innerHTML = `<div class="sem-res">❌ Erro: ${e.message}</div>`;
  }
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
window.addEventListener('load', () => {
  if (localStorage.getItem('hsa_ops_auth')==='1') {
    document.getElementById('senha-overlay').style.display = 'none';
    document.getElementById('loading-overlay').style.display = 'flex';
    iniciar();
  }
});
</script>
