<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cotação — Spa da Alma</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #F7F3EE;
  --brown: #5C3D2E;
  --brown-light: #8B6347;
  --gold: #B89A6A;
  --gold-light: #D4B896;
  --green: #3D5A4C;
  --green-light: #5A7A68;
  --text: #2C2016;
  --text-light: #7A6555;
  --border: #D8C9B8;
  --white: #FDFAF6;
  --red: #c0392b;
  --shadow: 0 2px 16px rgba(92,61,46,0.10);
}
body {
  font-family: 'Jost', sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
}

/* HEADER */
.header {
  background: var(--brown);
  padding: 24px 16px 18px;
  text-align: center;
  position: relative;
}
.header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 300;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold-light);
}
.header p {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(247,243,238,0.5);
  margin-top: 3px;
}
.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 10px;
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
  color: rgba(247,243,238,0.7);
}
.status-pill.ok { background: rgba(61,90,76,0.4); color: #a8d4bc; }
.status-pill.err { background: rgba(192,57,43,0.3); color: #f1a9a0; }

/* LAYOUT */
.app { max-width: 500px; margin: 0 auto; padding: 20px 16px 80px; }

/* SECTION */
.sec-title {
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-light);
  font-weight: 600;
  margin: 20px 0 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sec-title::after { content:''; flex:1; height:1px; background:var(--border); }

/* CARD */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
}

/* FORM */
.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
label {
  display: block;
  font-size: 10px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--text-light);
  font-weight: 500;
  margin-bottom: 5px;
}
input, select {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: 'Jost', sans-serif;
  font-size: 15px;
  color: var(--text);
  background: var(--white);
  outline: none;
  -webkit-appearance: none;
}
input:focus, select:focus { border-color: var(--gold); }
input[readonly] { background: #f9f7f4; color: var(--text-light); }

.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

/* CRIANCAS */
.crianca-field { }
.crianca-label-sub {
  font-size: 9px;
  color: var(--text-light);
  margin-bottom: 4px;
  display: block;
}

/* ALERTAS */
.alerta {
  background: #fff8e1;
  border: 1px solid #f0c040;
  border-radius: 6px;
  padding: 10px 12px;
  font-size: 12px;
  color: #7a5c00;
  margin-bottom: 12px;
  display: none;
}
.alerta.show { display: block; }

/* BOTÃO PRINCIPAL */
.btn-calcular {
  width: 100%;
  padding: 15px;
  background: var(--brown);
  color: var(--cream);
  border: none;
  border-radius: 8px;
  font-family: 'Jost', sans-serif;
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 500;
  cursor: pointer;
  margin-bottom: 12px;
  transition: background 0.2s;
}
.btn-calcular:hover { background: var(--brown-light); }
.btn-calcular:disabled { background: #bbb; cursor: not-allowed; }

/* RESULTADO */
#resultado { display: none; }

/* CARD DE CHALÉ */
.chale-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 10px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.chale-card-header {
  background: var(--brown);
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.chale-card-nome {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  color: var(--gold-light);
  font-weight: 400;
  letter-spacing: 1px;
}
.chale-card-cat {
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: rgba(247,243,238,0.55);
}
.chale-card-body { padding: 12px 14px; }
.valor-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid rgba(216,201,184,0.4);
}
.valor-row:last-child { border-bottom: none; }
.valor-label {
  font-size: 11px;
  letter-spacing: 0.5px;
  color: var(--text-light);
  font-weight: 500;
}
.valor-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--brown);
}
.valor-num.destaque { color: var(--green); }

/* QUADRO SINAL */
.quadro {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 10px;
}
.quadro-title {
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-light);
  font-weight: 600;
  margin-bottom: 10px;
}
.quadro-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 6px;
  font-size: 13px;
}
.quadro-row:last-child { margin-bottom: 0; }
.quadro-val {
  font-weight: 600;
  color: var(--brown);
}

/* INFO QUADRO */
.info-row {
  display: flex;
  gap: 8px;
  align-items: flex-start;
  margin-bottom: 8px;
  font-size: 12px;
  line-height: 1.5;
}
.info-row:last-child { margin-bottom: 0; }
.info-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

/* AÇÕES */
.acoes {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}
.btn-img {
  flex: 1;
  padding: 13px;
  background: var(--cream);
  color: var(--brown);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: 'Jost', sans-serif;
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.btn-img:hover { background: var(--border); }
.btn-wa {
  flex: 1;
  padding: 13px;
  background: var(--green);
  color: white;
  border: none;
  border-radius: 8px;
  font-family: 'Jost', sans-serif;
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: background 0.2s;
}
.btn-wa:hover { background: var(--green-light); }

/* TOAST */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--brown);
  color: var(--cream);
  padding: 10px 20px;
  border-radius: 6px;
  font-size: 13px;
  opacity: 0;
  transition: all 0.3s;
  z-index: 999;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ÁREA DE CAPTURA DE IMAGEM */
#cotacao-imagem {
  background: white;
  padding: 20px;
  font-family: 'Jost', sans-serif;
}
#cotacao-imagem .img-header {
  background: var(--brown);
  padding: 16px;
  text-align: center;
  border-radius: 8px 8px 0 0;
  margin: -20px -20px 16px;
}
#cotacao-imagem .img-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  color: var(--gold-light);
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 300;
}
#cotacao-imagem .img-sub {
  font-size: 10px;
  color: rgba(247,243,238,0.5);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 2px;
}
</style>
</head>
<body>

<div class="header">
  <h1>Spa da Alma</h1>
  <p>Gerador de Cotações · Monte Verde</p>
  <div class="status-pill" id="status-pill">⏳ Carregando tarifas...</div>
</div>


<div class="app">

  <!-- ALERTA FERIADO -->
  <div class="alerta" id="alerta-feriado"></div>

  <!-- HÓSPEDE -->
  <div class="sec-title">Hóspede</div>
  <div class="card">
    <div class="field">
      <label>Nome</label>
      <input type="text" id="nome" placeholder="Ex: Ana e João">
    </div>
    <div class="field">
      <label>WhatsApp</label>
      <input type="tel" id="tel" placeholder="Ex: 11 98148 5111" maxlength="16">
    </div>
  </div>

  <!-- PERÍODO -->
  <div class="sec-title">Período</div>
  <div class="card">
    <div class="row2">
      <div class="field">
        <label>Check-in</label>
        <input type="date" id="checkin" onchange="onDatasChange()">
      </div>
      <div class="field">
        <label>Check-out</label>
        <input type="date" id="checkout" onchange="onDatasChange()">
      </div>
    </div>
    <div class="field">
      <label>Diárias</label>
      <input type="text" id="diarias" readonly placeholder="—">
    </div>
  </div>

  <!-- HÓSPEDES -->
  <div class="sec-title">Hóspedes</div>
  <div class="card">
    <div class="field">
      <label>Adultos</label>
      <input type="number" id="adultos" min="1" max="12" value="2" onchange="onHospedesChange()">
    </div>
    <div class="field">
      <label>Crianças</label>
      <div class="row3">
        <div class="crianca-field">
          <span class="crianca-label-sub">0–2 anos</span>
          <input type="number" id="crianca-bebe" min="0" max="5" value="0" onchange="onHospedesChange()">
        </div>
        <div class="crianca-field">
          <span class="crianca-label-sub">2–10 anos</span>
          <input type="number" id="crianca-kid" min="0" max="5" value="0" onchange="onHospedesChange()">
        </div>
        <div class="crianca-field">
          <span class="crianca-label-sub">10–17 anos</span>
          <input type="number" id="crianca-teen" min="0" max="5" value="0" onchange="onHospedesChange()">
        </div>
      </div>
      <div style="font-size:10px;color:var(--text-light);margin-top:6px">
        0–2: isento · 2–10: R$140/noite · 10–17: tarifa adulto adicional
      </div>
    </div>
  </div>

  <div class="sec-title">Desconto</div>
  <div class="card">
    <div class="field" style="margin-bottom:0">
      <label>Desconto % <span style="font-size:9px;color:var(--text-light);text-transform:none;letter-spacing:0">(opcional — aplicado sobre todos os valores)</span></label>
      <div style="display:flex;align-items:center;gap:10px">
        <input type="number" id="desconto" min="0" max="50" step="1" value="0"
          style="max-width:100px;font-size:18px;font-weight:600;text-align:center"
          onchange="onDescontoChange()" oninput="onDescontoChange()">
        <span style="font-size:22px;color:var(--text-light)">%</span>
        <span id="desconto-badge" style="display:none;font-size:12px;color:var(--green);font-weight:600;background:rgba(61,90,76,0.1);padding:4px 10px;border-radius:20px"></span>
      </div>
    </div>
  </div>

  <button class="btn-calcular" id="btn-calcular" onclick="calcular()">
    Calcular Cotação
  </button>

  <!-- RESULTADO -->
  <div id="resultado">
    <!-- RACIONAL DE CÁLCULO -->
    <div id="racional-wrap" style="margin-bottom:12px">
      <div onclick="toggleRacional()" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:10px 14px;background:var(--white);border:1px solid var(--border);border-radius:8px;user-select:none">
        <span style="font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-light)">📊 Racional de cálculo</span>
        <span id="racional-chevron" style="font-size:14px;color:var(--text-light);transition:transform 0.2s">▼</span>
      </div>
      <div id="racional-body" style="display:none;background:var(--white);border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;padding:12px 14px">
        <div id="racional-inner" style="font-size:12px;line-height:1.8;color:var(--text)"></div>
      </div>
    </div>

    <div class="sec-title">Cotação</div>
    <div id="resultado-inner"></div>
    <div class="acoes">
      <button class="btn-img" onclick="salvarImagem()">⬇ Salvar Imagem</button>
      <button class="btn-wa" onclick="enviarWhatsApp()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        WhatsApp
      </button>
    </div>
  </div>

</div><!-- /app -->

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════
// DROPBOX
// ═══════════════════════════════════
const DBX_KEY     = 't9mc3s9ugrc93m0';
const DBX_SECRET  = 'tzoxlevzfu4o9x7';
const DBX_REFRESH = 'YyymmuyHYqwAAAAAAAAAAUfgijZMK3bc4OIseueVt7JpZQjjfIh398AB9tq6FE2F';
const DBX_TARIFAS = '/Monte Verde + TV/Gerencial/TARIFAS HSA 2024-25.xlsx';
const DBX_RESERVAS= '/Monte Verde + TV/Gerencial/hsa_reservas.json';

let dbxToken = '';

async function dbxAuth() {
  const r = await fetch('https://api.dropboxapi.com/oauth2/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: `grant_type=refresh_token&refresh_token=${DBX_REFRESH}&client_id=${DBX_KEY}&client_secret=${DBX_SECRET}`
  });
  const d = await r.json();
  if (!d.access_token) throw new Error('Auth falhou');
  dbxToken = d.access_token;
}

async function dbxDownload(path) {
  const r = await fetch('https://content.dropboxapi.com/2/files/download', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + dbxToken,
      'Dropbox-API-Arg': JSON.stringify({ path })
    }
  });
  if (!r.ok) throw new Error('Dropbox ' + r.status + ': ' + path);
  return r;
}

// ═══════════════════════════════════
// DADOS GLOBAIS
// ═══════════════════════════════════
const CHALES_INFO = [
  { nome: 'Charmey',   cat: 'Romântico',        maxAdultos: 2, maxCriancas: { bebe: 1, kid: 0, teen: 0 }, minTotal: 1 },
  { nome: 'Cheverny',  cat: 'Romântico',         maxAdultos: 2, maxCriancas: { bebe: 1, kid: 0, teen: 0 }, minTotal: 1 },
  { nome: 'Monblanc',  cat: 'Romântico Premium', maxAdultos: 2, maxCriancas: { bebe: 1, kid: 0, teen: 0 }, minTotal: 1 },
  { nome: 'Everest',   cat: 'Nupcial Premium',   maxAdultos: 3, maxCriancas: { bebe: 1, kid: 1, teen: 1 }, minTotal: 1 },
  { nome: 'Martigny',  cat: 'Nupcial Premium +', maxAdultos: 3, maxCriancas: { bebe: 1, kid: 1, teen: 1 }, minTotal: 1 },
  { nome: 'Monviso',   cat: 'Família',           maxAdultos: 12, maxCriancas: { bebe: 5, kid: 5, teen: 5 }, minTotal: 4 },
];

// Tarifas parseadas do Excel
// TARIFAS[chaleNome][pax] = { janFDS, janDDS, abrFDS, abrDDS, julFDS, julDDS, ferFDS, ferDDS }
let TARIFAS = null;
let FERIADOS = []; // [{entrada, saida, estoMin, nome}]
let TARIFA_KID = 140;  // R$/noite criança 2-10 (pode vir da planilha)
let RESERVAS = [];
let tarifasOk = false;

// ═══════════════════════════════════
// PARSE DA PLANILHA
// ═══════════════════════════════════
async function carregarTarifas() {
  setPill('loading', '⏳ Carregando tarifas...');
  await dbxAuth();
  setPill('loading', '⏳ Baixando planilha...');

  const r = await dbxDownload(DBX_TARIFAS);
  const buf = await r.arrayBuffer();
  const wb = XLSX.read(buf, { type: 'array', raw: true });

  const wsName = 'Tarifas App - Atual';
  const ws = wb.Sheets[wsName];
  if (!ws) {
    const abas = wb.SheetNames.join(', ');
    throw new Error(`Aba "${wsName}" não encontrada. Abas: ${abas}`);
  }

  const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });

  // Detectar linha de header (col A = "Chalé")
  let hRow = -1;
  for (let i = 0; i < Math.min(data.length, 20); i++) {
    const v = String(data[i]?.[0] || '').trim().toLowerCase();
    if (v === 'chalé' || v === 'chale') { hRow = i; break; }
  }
  if (hRow < 0) throw new Error('Header "Chalé" não encontrado na planilha');

  // Detectar colunas pelos headers (2 linhas acima do hRow)
  const periodoRow = data[hRow - 2] || [];
  const ddsfdsRow  = data[hRow - 1] || [];

  // Mapear colunas — limitado às primeiras 16 colunas (tabela principal)
  const COL = { chale: 0, cat: 1, pax: 2, tarifa: 3 };
  const colMap = {};
  for (let c = 4; c < 16; c++) {
    const per = String(periodoRow[c] || '').toUpperCase().trim();
    const ddf = String(ddsfdsRow[c]  || '').toUpperCase().trim();
    if (!per && !ddf) continue;

    if (per.includes('TIRADENTES') || per.includes('TIRAD')) {
      // ignorar por enquanto
    } else if (per.includes('FERIADO')) {
      // Coluna única de feriados — sem FDS/DDS separado
      colMap.ferFDS = c;
      colMap.ferDDS = c;
    } else if (per.includes('JAN') || per.includes('MAR') ||
               per.includes('SET') || per.includes('OUT') || per.includes('NOV')) {
      if (ddf.includes('FDS')) colMap.janFDS = c;
      else if (ddf.includes('DDS')) colMap.janDDS = c;
    } else if (per.includes('ABR') || per.includes('JUN') || per.includes('AGO')) {
      if (ddf.includes('FDS')) colMap.abrFDS = c;
      else if (ddf.includes('DDS')) colMap.abrDDS = c;
    } else if (per.includes('JUL')) {
      if (ddf.includes('FDS')) colMap.julFDS = c;
      else if (ddf.includes('DDS')) colMap.julDDS = c;
    } else if (per.includes('DEZ')) {
      if (ddf.includes('FDS')) colMap.dezFDS = c;
      else if (ddf.includes('DDS')) colMap.dezDDS = c;
    }
  }

  // Fallback baseado no colMap detectado (janFDS como âncora)
  const baseCol = colMap.janFDS || 5;
  const FM = {
    janFDS: baseCol,     janDDS: baseCol + 1,
    abrFDS: baseCol + 2, abrDDS: baseCol + 3,
    julFDS: baseCol + 4, julDDS: baseCol + 5,
    ferFDS: baseCol + 7, ferDDS: baseCol + 7
  };
  Object.keys(FM).forEach(k => { if (!colMap[k]) colMap[k] = FM[k]; });
  if (!colMap.dezFDS) { colMap.dezFDS = colMap.abrFDS; colMap.dezDDS = colMap.abrDDS; }


  // Parse tarifas NR
  TARIFAS = {};
  let curChale = '';
  for (let i = hRow + 1; i < data.length; i++) {
    const row = data[i];
    if (!row) continue;
    const chaleCel = String(row[COL.chale] || '').trim();
    if (chaleCel) curChale = normChale(chaleCel);
    const tarTipo = String(row[COL.tarifa] || '').trim().toUpperCase();
    if (tarTipo !== 'NR') continue;
    if (!curChale) continue;

    const pax = parseInt(row[COL.pax]) || 2;
    if (!TARIFAS[curChale]) TARIFAS[curChale] = {};
    if (!TARIFAS[curChale][pax]) TARIFAS[curChale][pax] = {};

    const get = c => { const v = parseFloat(String(row[c]||'').replace(',','.')); return isNaN(v) ? null : v; };
    TARIFAS[curChale][pax] = {
      janFDS: get(colMap.janFDS), janDDS: get(colMap.janDDS),
      abrFDS: get(colMap.abrFDS), abrDDS: get(colMap.abrDDS),
      julFDS: get(colMap.julFDS), julDDS: get(colMap.julDDS),
      dezFDS: get(colMap.dezFDS), dezDDS: get(colMap.dezDDS),
      ferFDS: get(colMap.ferFDS), ferDDS: get(colMap.ferDDS),
    };
  }

  // Parse feriados e tarifa de criança
  parseFeriadosECrianca(data, hRow);

  // Carregar reservas
  try {
    const rj = await dbxDownload(DBX_RESERVAS);
    RESERVAS = await rj.json();
  } catch(e) { RESERVAS = []; }

  tarifasOk = true;
  console.log('[Cotação] Chalés parseados:', Object.keys(TARIFAS));
  console.log('[Cotação] Feriados:', FERIADOS.map(f =>
    `${f.nome}: ${f.entrada.toLocaleDateString('pt-BR')} → ${f.saida.toLocaleDateString('pt-BR')} (min ${f.estoMin})`
  ));
  setPill('ok', '✅ Tarifas carregadas · ' + new Date().toLocaleTimeString('pt-BR'));
}

function parseFeriadosECrianca(data, hRow) {
  FERIADOS = [];

  // Procurar célula com "feriado" em qualquer posição
  let ferRow = -1, ferCol = -1;
  for (let i = 0; i < data.length; i++) {
    if (!data[i]) continue;
    for (let c = 0; c < (data[i].length || 30); c++) {
      const v = String(data[i][c] || '').trim().toLowerCase();
      if (v === 'feriados' || v === 'feriado') {
        ferRow = i; ferCol = c;
        break;
      }
    }
    if (ferRow >= 0) break;
  }

  if (ferRow < 0) return;

  // Encontrou — ler dados
  // Sub-headers na linha seguinte (ferRow+1)
  const subHdr = data[ferRow + 1] || [];
  let cEnt = ferCol + 1, cSai = ferCol + 2, cMin = ferCol + 3, cNome = ferCol + 4;

  // Detectar pelas sub-headers
  for (let c = ferCol; c < ferCol + 8; c++) {
    const h = String(subHdr[c] || '').toLowerCase().trim();
    if (h.includes('entrada')) cEnt = c;
    else if (h.includes('saída') || h.includes('saida')) cSai = c;
    else if (h.includes('min')) cMin = c;
    else if (h.includes('nome') || h.includes('desc')) cNome = c;
  }

  // Se não detectou pelos headers, tentar inferir pela primeira linha de dados
  // procurando onde estão as datas (strings com "/" ou números seriais Excel)
  if (cEnt === ferCol + 1) {
    const primeiraLinha = data[ferRow + 2] || [];
    for (let c = ferCol; c < Math.min(ferCol + 10, primeiraLinha.length); c++) {
      const v = primeiraLinha[c];
      if (!v) continue;
      const parsed = excelDate(v);
      if (parsed) {
        cEnt = c;
        cSai = c + 1;
        cMin = c + 2;
        cNome = c + 3;
        break;
      }
    }
  }

  // Dados a partir de ferRow+2
  for (let i = ferRow + 2; i < Math.min(ferRow + 30, data.length); i++) {
    const row = data[i];
    if (!row) continue;
    const entrada = excelDate(row[cEnt]);
    const saida   = excelDate(row[cSai]);
    if (!entrada || !saida) continue;
    FERIADOS.push({
      entrada, saida,
      estoMin: parseInt(row[cMin]) || 2,
      nome: String(row[cNome] || row[ferCol + 4] || '').trim()
    });
  }



  // Tarifa criança 2-10
  for (let i = ferRow + 2; i < Math.min(ferRow + 40, data.length); i++) {
    if (!data[i]) continue;
    for (let c = 0; c < (data[i].length || 30); c++) {
      const v = String(data[i][c] || '');
      const num = parseFloat(v.replace(/[^\d.,]/g,'').replace(',','.'));
      if (num === 140) { TARIFA_KID = 140; return; }
    }
  }
}

function excelDate(v) {
  if (!v) return null;
  if (v instanceof Date) return new Date(v.getFullYear(), v.getMonth(), v.getDate());
  if (typeof v === 'number') {
    const d = new Date(Math.round((v - 25569) * 86400000));
    return new Date(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
  }
  const s = String(v).trim();
  // dd/mmm/yyyy com mês em português (ex: 13/fev/2026)
  const meses = { jan:0,fev:1,mar:2,abr:3,mai:4,jun:5,jul:6,ago:7,set:8,out:9,nov:10,dez:11 };
  const m1 = s.match(/^(\d{1,2})[\/\-]([a-záé]+)[\/\-](\d{4})$/i);
  if (m1) {
    const mes = meses[m1[2].toLowerCase().slice(0,3)];
    if (mes !== undefined) return new Date(+m1[3], mes, +m1[1]);
  }
  // dd/mm/yyyy
  const m2 = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m2) return new Date(+m2[3], +m2[2]-1, +m2[1]);
  // yyyy-mm-dd
  const m3 = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m3) return new Date(+m3[1], +m3[2]-1, +m3[3]);
  return null;
}

function normChale(s) {
  return String(s).replace(/\[.*?\]/g,'').trim()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
}

// Mapear nome do chalé para chave no TARIFAS (Charmey e Cheverny compartilham linha)
function chaveChale(nome) {
  const n = normChale(nome);
  // Na planilha podem estar como "Charmey/Cheverny" ou "Charmey e Cheverny"
  if (n === 'charmey' || n === 'cheverny') return null; // resolvido em getTarifaDiaria
  return n;
}

// ═══════════════════════════════════
// TARIFAS — BUSCA
// ═══════════════════════════════════
function isFDS(date) {
  const d = date.getDay(); // 5=Sex, 6=Sab
  return d === 5 || d === 6;
}

function toMidnight(d) {
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

function getFeriado(date) {
  const dm = toMidnight(date);
  for (const f of FERIADOS) {
    const ent = toMidnight(f.entrada);
    const sai = toMidnight(f.saida);
    if (dm >= ent && dm < sai) return f;
  }
  return null;
}

function getColKey(date) {
  const f = getFeriado(date);
  if (f) return isFDS(date) ? 'ferFDS' : 'ferDDS';
  const m = date.getMonth() + 1;
  const fds = isFDS(date);
  // Jan-Mar, Set-Nov → janFDS/janDDS
  if (m <= 3 || (m >= 9 && m <= 11)) return fds ? 'janFDS' : 'janDDS';
  // Abr-Jun, Ago → abrFDS/abrDDS
  if ((m >= 4 && m <= 6) || m === 8) return fds ? 'abrFDS' : 'abrDDS';
  // Jul → julFDS/julDDS
  if (m === 7) return fds ? 'julFDS' : 'julDDS';
  // Dez → dezFDS/dezDDS
  if (m === 12) return fds ? 'dezFDS' : 'dezDDS';
  return fds ? 'janFDS' : 'janDDS';
}

function getTarifaDiaria(chaleNome, paxAdultos, date) {
  const colKey = getColKey(date);
  const n = normChale(chaleNome);

  // Charmey e Cheverny podem estar juntos na planilha como "charmey/cheverny" ou separados
  let chaleTarifas = TARIFAS[n];
  if (!chaleTarifas && (n === 'charmey' || n === 'cheverny')) {
    // Tentar variações possíveis do nome na planilha
    chaleTarifas = TARIFAS['charmey/cheverny'] ||
                   TARIFAS['charmey e cheverny'] ||
                   TARIFAS['charmey'] ||
                   TARIFAS['cheverny'];
  }
  if (!chaleTarifas) return null;

  const paxOptions = Object.keys(chaleTarifas).map(Number).sort((a,b) => a-b);
  const paxUsar = paxOptions.find(p => p >= paxAdultos) || paxOptions[paxOptions.length - 1];
  return chaleTarifas[paxUsar]?.[colKey] || null;
}

function calcTotalChale(chaleNome, paxAdultos, checkin, checkout, criancaKid, criancaTeen) {
  const nDiarias = Math.round((checkout - checkin) / 86400000);
  if (nDiarias <= 0) return null;

  let totalBase = 0;
  let totalKid = 0;
  let totalTeen = 0;

  const dbgNoites = [];
  for (let i = 0; i < nDiarias; i++) {
    const d = new Date(checkin); d.setDate(d.getDate() + i);
    const tarifa = getTarifaDiaria(chaleNome, paxAdultos, d);
    const feriado = getFeriado(d);
    const colKey = getColKey(d);
    dbgNoites.push(`${toISO(d)}: ${colKey}${feriado?' 🗓️'+feriado.nome:''} = R$${tarifa}`);
    if (tarifa === null) return null;
    // Regra: 1 diária = tarifa × 2 × 70%
    const tarifaEfetiva = nDiarias === 1 ? tarifa * 2 * 0.70 : tarifa;
    totalBase += tarifaEfetiva;
    totalKid  += criancaKid  * (nDiarias === 1 ? TARIFA_KID * 2 * 0.70 : TARIFA_KID);
    if (criancaTeen > 0) {
      const tarifaTeen = getTarifaDiaria(chaleNome, paxAdultos + criancaTeen, d) || tarifa;
      const diffTeen = nDiarias === 1 ? (tarifaTeen - tarifa) * 2 * 0.70 : (tarifaTeen - tarifa);
      totalTeen += diffTeen * criancaTeen;
    }
  }

  const total = totalBase + totalKid + totalTeen;
  const desc  = getDesconto();
  const cc4x  = Math.ceil(total * (1 - desc));
  const ccAV  = Math.ceil(total * (1 - desc) * 0.98);
  const pix   = Math.ceil(total * (1 - desc) * 0.95);

  return { cc4x, ccAV, pix, nDiarias, dbgNoites };
}

// DISPONIBILIDADE
// ═══════════════════════════════════
const STATUS_RESERVA_OK = [
  'Confirmada e Paga Parcial','Confirmada e Paga 100%',
  'Confirmada e Não Paga','Confirmada e CC Inválido',
  'Em cotação','Concluída','Concluída - ag. Pgto agência'
];

function chaleDisponivel(chaleNome, ciDate, coDate) {
  const ciStr = toISO(ciDate), coStr = toISO(coDate);
  return !RESERVAS.some(r => {
    if (!STATUS_RESERVA_OK.includes(r.status)) return false;
    const rNome = normChale(r.chale || '');
    if (!rNome.includes(normChale(chaleNome))) return false;
    const rCi = r.entrada, rCo = r.saida;
    if (!rCi || !rCo) return false;
    // Conflito: períodos se sobrepõem (entrada no dia da saída = OK)
    return ciStr < rCo && coStr > rCi;
  });
}

function toISO(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

// ═══════════════════════════════════
// CAPACIDADE
// ═══════════════════════════════════
function chaleTemCapacidade(chale, adultos, bebe, kid, teen) {
  const totalAdultos = adultos + teen;
  const totalHospedes = adultos + bebe + kid + teen;
  if (totalHospedes < (chale.minTotal || 1)) return false; // Monviso: mín 4
  if (totalAdultos > chale.maxAdultos) return false;
  if (bebe > chale.maxCriancas.bebe) return false;
  if (kid  > chale.maxCriancas.kid)  return false;
  return true;
}

  }

function getDesconto() {
  return Math.max(0, Math.min(50, parseFloat(document.getElementById('desconto').value) || 0)) / 100;
}


function verificarFeriado(ci, co) {
  const alerta = document.getElementById('alerta-feriado');
  if (!tarifasOk || !ci || !co) { alerta.classList.remove('show'); return; }
  const ciDate = new Date(ci + 'T12:00:00');
  const coDate = new Date(co + 'T12:00:00');
  const nDiarias = Math.round((coDate - ciDate) / 86400000);
  if (nDiarias <= 0) { alerta.classList.remove('show'); return; }

  // Verificar se alguma noite cai em feriado
  let feriadoEncontrado = null;
  let noitesFeriado = 0;
  for (let i = 0; i < nDiarias; i++) {
    const d = new Date(ciDate); d.setDate(d.getDate() + i);
    const f = getFeriado(d);
    if (f) { feriadoEncontrado = f; noitesFeriado++; }
  }

  if (feriadoEncontrado) {
    // Verificar estadia mínima pelo checkin
    const fCi = getFeriado(ciDate);
    if (fCi && nDiarias < fCi.estoMin) {
      alerta.textContent = `⚠️ ${fCi.nome}: estadia mínima de ${fCi.estoMin} noites. Período informado: ${nDiarias} noite${nDiarias!==1?'s':''}.`;
    } else {
      alerta.textContent = `🗓️ ${noitesFeriado} noite${noitesFeriado!==1?'s':''} em período de feriado: ${feriadoEncontrado.nome}. Tarifas de feriado aplicadas.`;
    }
    alerta.classList.add('show');
  } else {
    alerta.classList.remove('show');
  }
}

// CALCULAR
// ═══════════════════════════════════
function calcular() {
  const ci = document.getElementById('checkin').value;
  const co = document.getElementById('checkout').value;
  if (!ci || !co) { showToast('Informe as datas'); return; }
  if (!tarifasOk)  { showToast('Tarifas ainda carregando'); return; }

  const ciDate = new Date(ci + 'T12:00:00');
  const coDate = new Date(co + 'T12:00:00');
  const nDiarias = Math.round((coDate - ciDate) / 86400000);
  if (nDiarias <= 0) { showToast('Datas inválidas'); return; }

  // Verificar feriado no checkin e estadia mínima
  const fCi = getFeriado(ciDate);
  if (fCi && nDiarias < fCi.estoMin) {
    showToast(`Estadia mínima no feriado: ${fCi.estoMin} noites`);
    return;
  }

  const adultos = parseInt(document.getElementById('adultos').value) || 2;
  const bebe    = parseInt(document.getElementById('crianca-bebe').value) || 0;
  const kid     = parseInt(document.getElementById('crianca-kid').value)  || 0;
  const teen    = parseInt(document.getElementById('crianca-teen').value) || 0;

  const resultados = [];

  for (const chale of CHALES_INFO) {
    // Capacidade
    if (!chaleTemCapacidade(chale, adultos, bebe, kid, teen)) continue;
    // Disponibilidade
    if (!chaleDisponivel(chale.nome, ciDate, coDate)) continue;
    // Calcular valor
    const calc = calcTotalChale(chale.nome, adultos, ciDate, coDate, kid, teen);
    if (!calc) continue;
    resultados.push({ chale, calc });
  }

  renderResultado(resultados, ci, co, nDiarias, adultos, bebe, kid, teen, fCi);
}

  resultados.forEach(({ chale, calc }, i) => {
    const bg = i % 2 === 0 ? 'var(--white)' : '#faf8f5';

        <tr style="background:${bg};border-bottom:1px solid rgba(216,201,184,0.3)">

            <div style="font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:var(--brown)">${chale.nome}</div>

          <td style="padding:11px 8px;text-align:center">
            <div style="font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--text)">${fmtBRL(calc.cc4x)}</div>
          </td>
          <td style="padding:11px 8px;text-align:center">
            <div style="font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--text)">${fmtBRL(calc.ccAV)}</div>
          </td>
          <td style="padding:11px 8px;text-align:center">
            <div style="font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:var(--green)">${fmtBRL(calc.pix)}</div>

  });

  html += `
      </tbody>
    </table>
  </div>

  <!-- CONDIÇÕES DE PAGAMENTO -->
  <div style="background:var(--white);border:1px solid var(--border);border-top:none;padding:12px 14px">
    <div style="font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-light);font-weight:600;margin-bottom:7px">💳 Pagamento</div>
    <div style="font-size:12px;color:var(--text);line-height:1.5">
      <strong>20% no ato da reserva</strong> via PIX ou transferência bancária. Saldo conforme opção escolhida.
    </div>
  </div>

  <!-- INFORMAÇÕES -->
  <div style="background:var(--white);border:1px solid var(--border);border-top:none;padding:12px 14px">
    <div style="font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-light);font-weight:600;margin-bottom:8px">ℹ️ Informações</div>
    <div style="display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--text);line-height:1.5">
      <div><strong>📅 Check-in:</strong> ${fmtData(ci)}, a partir das 15h</div>
      <div><strong>📅 Check-out:</strong> ${fmtData(co)}, até 12h</div>
      <div><strong>☕ Café da manhã</strong> servido no chalé em horário a combinar</div>
      <div>♨️ Cortesia de 1 sessão de ofurô ou sauna seca, mediante 3 posts no Instagram marcando a pousada. <em>Sujeito à disponibilidade — agendar com antecedência.</em></div>
      <div>⭐ A cada reserva você entra para o <strong>Cliente Prime</strong> e ganha cashback em uma próxima estadia</div>
    </div>
  </div>

  <!-- RODAPÉ -->
  <div style="background:var(--brown);border-radius:0 0 10px 10px;padding:12px 16px;text-align:center">
    <div style="font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--gold-light);letter-spacing:2px;text-transform:uppercase;font-weight:300">Hospedagem Spa da Alma</div>
    <div style="font-size:9px;color:rgba(247,243,238,0.5);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px">Monte Verde · MG · (35) 3438-1131</div>
  </div>`;

  div.innerHTML = html;

  renderRacional(resultados, new Date(ci + 'T12:00:00'), nDiarias);
  document.getElementById('resultado').style.display = 'block';
  document.getElementById('resultado').scrollIntoView({ behavior: 'smooth' });
}

// ═══════════════════════════════════
// SALVAR IMAGEM
// ═══════════════════════════════════
async function salvarImagem() {
  const el = document.getElementById('resultado-inner');
  showToast('Gerando imagem...');
  const canvas = await html2canvas(el, {
    scale: 2, backgroundColor: '#F7F3EE', useCORS: true,
    logging: false
  });
  const link = document.createElement('a');
  const nome = document.getElementById('nome').value.trim().split(' ')[0] || 'cotacao';
  link.download = `cotacao_spa_alma_${nome}_${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('Imagem salva!');
}

// ═══════════════════════════════════
// WHATSAPP
// ═══════════════════════════════════
async function enviarWhatsApp() {
  const tel  = document.getElementById('tel').value.replace(/\D/g, '');
  const nome = document.getElementById('nome').value.trim();
  if (tel.length < 10) { showToast('Informe o WhatsApp do hóspede'); return; }

  await salvarImagem();

  const saudacao = nome ? `Olá, ${nome.split(' ')[0]}! 😊` : 'Olá! 😊';
  const msg = `${saudacao}\n\nSegue a cotação da *Hospedagem Spa da Alma* em Monte Verde conforme solicitado. Qualquer dúvida estamos à disposição! 🌿\n\nAqui no nosso catálogo você também pode ver algumas fotos de nossos chalés:\nhttps://wa.me/c/553534381131\n\n_Hospedagem Spa da Alma — Monte Verde, MG_`;
  const numero = tel.startsWith('55') ? tel : '55' + tel;
  setTimeout(() => window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`, '_blank'), 800);
}

// ═══════════════════════════════════
// UTILS
// ═══════════════════════════════════
function setPill(tipo, msg) {
  const el = document.getElementById('status-pill');
  el.className = 'status-pill' + (tipo === 'ok' ? ' ok' : tipo === 'err' ? ' err' : '');
  el.textContent = msg;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
(async function init() {
  // Datas sugeridas: hoje + 30 dias
  const hoje = new Date();
  const ci = new Date(hoje); ci.setDate(hoje.getDate() + 30);
  const co = new Date(ci);   co.setDate(ci.getDate() + 3);
  document.getElementById('checkin').value  = ci.toISOString().slice(0,10);
  document.getElementById('checkout').value = co.toISOString().slice(0,10);
  onDatasChange();

  try {
    await carregarTarifas();
  } catch(e) {
    console.error(e);
    setPill('err', '❌ ' + e.message);
  }
})();
</script>
